<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Iris Sabores</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="admin-body">
    <aside class="sidebar">
        <h3>Iris Admin</h3>
        <ul>
            <li><i class="fas fa-chart-line"></i> Dashboard</li>
            <li><i class="fas fa-box"></i> Stock & Armazém</li>
            <li><i class="fas fa-users"></i> Funcionários</li>
            <li><i class="fas fa-file-invoice"></i> Relatórios</li>
        </ul>
    </aside>

    <main class="admin-content">
        <header class="admin-header">
            <h2>Resumo Operacional</h2>
            <div class="user-info">Administrador 👑</div>
        </header>

        <section class="stats-container">
            <div class="stat-card">
                <h4>Vendas Hoje</h4>
                <h2 id="vendas-hoje">0,00 MT</h2>
                <span class="trend">↑ 12% vs ontem</span>
            </div>
            <div class="stat-card">
                <h4>Pedidos Ativos</h4>
                <h2 id="pedidos-ativos">0</h2>
            </div>
            <div class="stat-card warning">
                <h4>Stock Crítico</h4>
                <h2 id="stock-alerta">3 itens</h2>
            </div>
        </section>

        <section class="orders-tracking">
            <h3>Rastreio de Entregas (Google Maps)</h3>
            <div id="map" style="height: 400px; border-radius: 15px;"></div>
        </section>

        <section class="management-section">
            <div class="card">
                <h3>Gestão de Stock</h3>
                <table id="table-stock">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Status</th>
                            <th>Qtd</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="stock-list"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="admin-logic.js"></script>
</body>
</html>

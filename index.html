<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Sabores | Menu Digital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="logo">Iris Sabores</div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <header class="hero">
        <h1>O sabor que apaixona.</h1>
        <p>📍 Rua Artur do Canto Resende nº 1.390</p>
        <div class="contact-links">
            <a href="https://wa.me/258878743430"><i class="fab fa-whatsapp"></i></a>
            <a href="https://instagram.com/irissabores_"><i class="fab fa-instagram"></i></a>
        </div>
    </header>

    <section class="categories-nav">
        <button onclick="filterCategory('Pizzas')">Pizzas</button>
        <button onclick="filterCategory('Refeições')">Refeições</button>
        <button onclick="filterCategory('Bebidas')">Bebidas</button>
    </section>

    <main id="menu-grid" class="product-grid">
        </main>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h2>Seu Pedido</h2>
            <div id="cart-items"></div>
            <textarea id="order-obs" placeholder="Alguma preferência? (Ex: sem cebola)"></textarea>
            <div class="total-section">
                <span>Total:</span>
                <span id="cart-total">0,00 MT</span>
            </div>
            <button class="btn-checkout" onclick="processarPedido()">Confirmar Pedido (Passo 1)</button>
            <button class="btn-close" onclick="toggleCart()">Fechar</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
